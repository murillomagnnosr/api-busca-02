name: Testes Automatizados — Aula 2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Testes de Validação (Errors)
      run: pytest tests/test_errors.py -v --tb=short

    - name: Testes de Integração
      run: pytest tests/test_integration.py -v --tb=short

    - name: Testes com Mock (API Externa)
      run: pytest tests/test_mocks.py -v --tb=short

    - name: Run all tests with coverage
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
